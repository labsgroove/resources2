<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groove RP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Calibri:wght@400;700&display=swap" rel="stylesheet"> <!-- Calibri Font Link -->
    <style>
        body {
            font-family: 'Calibri', sans-serif;
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="top-left">
            <img src="logo.png" alt="Server Logo" class="logo">
        </div>
        <div class="top-section">
            <p class="discord-link">Groove</p>
        </div>
        <div class="player-info-container">
            <div class="info-box" id="idContainer">
                <img src="id_icon.png" alt="ID" class="icon">
                <span id="serverId" class="info-text">0</span>
            </div>
            <!-- New time section -->
            <div class="info-box" id="cashContainer">
                <img src="cash_icon.png" alt="Cash" class="icon">
                <span id="cash" class="info-text">$0</span>
            </div>
            <div class="info-box" id="bankContainer">
                <img src="bank_icon.png" alt="Bank" class="icon">
                <span id="bank" class="info-text">$0</span>
            </div>
            <div class="info-box" id="jobContainer">
                <img src="job_icon.png" alt="Job" class="icon">
                <span id="job" class="info-text">jogador</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
